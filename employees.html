<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - PayrollMS</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">P</span> PayrollMS
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="employees.html" class="active">Employees</a></li>
            <li><a href="attendance.html">Attendance</a></li>
            <li><a href="payroll.html">Payroll</a></li>
            <li><a href="reports.html">Reports</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>Employee Management</h1>
            <button class="btn-primary" onclick="toggleForm()">Add Employee</button>
        </div>

        <div class="form-box" id="employeeFormBox" style="display: none;">
            <h2>Add New Employee</h2>
            <form id="employeeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="empName">Full Name</label>
                        <input type="text" id="empName" placeholder="Enter employee name" required>
                    </div>
                    <div class="form-group">
                        <label for="empDept">Department</label>
                        <select id="empDept" required>
                            <option value="">Select Department</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Sales">Sales</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="empPosition">Position</label>
                        <input type="text" id="empPosition" placeholder="Enter position" required>
                    </div>
                    <div class="form-group">
                        <label for="empSalary">Basic Salary</label>
                        <input type="number" id="empSalary" placeholder="Enter salary" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="empEmail">Email</label>
                        <input type="email" id="empEmail" placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label for="empJoinDate">Join Date</label>
                        <input type="date" id="empJoinDate" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Employee</button>
                    <button type="button" class="btn-secondary" onclick="toggleForm()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="table-box">
            <div class="table-header">
                <h2>Employee List</h2>
                <input type="text" id="searchBox" placeholder="Search by name..." onkeyup="searchEmployee()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Position</th>
                        <th>Email</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTable">
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>2026 Payroll Management System | Web Technology Project</p>
    </footer>

    <script src="scripts/main.js"></script>
</body>
</html>
